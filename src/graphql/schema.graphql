type MGLanguage {
    code: String!
    displayCode: String!
    name: String!
}

type MGSet {
    code: String!
    name: String!
    releaseDate: String!
    cardCount: Int!
    isFoilOnly: Boolean!
    isOnlineOnly: Boolean!
    logoCode: String!
    mtgoCode: String
    keyruneUnicode: String!
    keyruneClass: String!
    yearSection: String!
    tcgplayerId: Int!
    setParent: MGSet
    setBlock: MGSetBlock
    setType: MGSetType!
    languages: [MGLanguage!]!
}

type MGSets {
    count: Int!
    sets: [MGSet!]!
}

type MGSetType {
    name: String!
}

type MGSetBlock {
    name: String!
    code: String!
}

type Query {
    sets: MGSets
    setsByType(type: String!): MGSets
    setByCode(code: String!): MGSet
}