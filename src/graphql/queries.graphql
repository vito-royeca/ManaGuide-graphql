fragment SetRelations on MGSet {
  setParent {
    code
  }
  setBlock {
    name
  }
  setType {
    name
  }
}

fragment CardBasicInfo on MGCard {
  cardID: newId
  name
  printedName
  
  tcgplayerID: tcgplayerId

  artCropURL
  normalURL
}

query CardByID($id: String!) {
  cardByID(id: $id) {
    ...CardBasicInfo
    arenaID: arenaId
    
    cmc
    collectorNumber
    faceOrder
    flavorText
    handModifier
    isBooster
    isDigital
    isFoil
    isFullArt
    isHighresImage
    isNonfoil
    isOversized
    isPromo
    isReprint
    isReserved
    isStorySpotlight
    isTextless
    lifeModifier
    loyalty
    manaCost
    mtgoFoilID: mtgoFoilId
    mtgoID: mtgoId
    multiverseIDs: multiverseIds
    numberOrder
    nameSection
    oracleText
    pngURL
    power
    printedText
    printedTypeLine
    releasedAt
    toughness
    typeLine
    artists {
      name
    }
    colors {
      name
      symbol
    }
    colorIdentities{
      name
      symbol
    }
    colorIndicators{
      name
      symbol
    }
    componentParts {
      card {
        ...CardBasicInfo
      }
      component {
        name
      }
    }
    faces {
      ...CardBasicInfo
    }
    formatLegalities {
      format {
        name
      }
      legality {
        name
      }
    }
    frame {
      name
      description
    }
    frameEffects {
      name
      description
    }
    languages {
      displayCode
      name
    }
    layout {
      name
      description
    }
    otherLanguages {
      ...CardBasicInfo
    }
    otherPrintings {
      ...CardBasicInfo
    }
    prices {
      market
    }
    rarity {
      name
    }
    set {
      code
    }
    subtypes {
      name
    }
    supertypes {
      name
    }
    variations {
      ...CardBasicInfo
    }
    watermark {
      name
    }
  }
}

query SetByCode($input: SetByCodeInput!) {
  setByCode(input: $input) {
    code
    name
    cardCount
    releaseDate
    ...SetRelations
    cards {
      cardID: newId
    }
  }
}

query Sets {
  sets {
    count
    sets {
      code
      name
      cardCount
      releaseDate
      ...SetRelations
    }
  }  
}


query SetsByType {
  expansion:setsByType(type: "Expansion") {
    count
    sets {
        code
        name
        cardCount
        releaseDate
        ...SetRelations
    }
  }
  commander:setsByType(type: "Commander") {
    count
    sets {
        code
        name
        cardCount
        releaseDate
        ...SetRelations
    }
  }
}

query SetsByType($type: String!) {
  setsByType(type: $type) {
    count
    sets {
        code
        name
        cardCount
        releaseDate
        ...SetRelations
    }
  }  
}

