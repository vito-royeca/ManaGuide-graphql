fragment SetRelations on MGSet {
  setParent {
    code
  }
  setBlock {
    name
  }
  setType {
    name
  }
}

query SetByCode($code: String!) {
  setByCode(code: $code) {
    code
      name
      cardCount
      releaseDate
      ...SetRelations
  }
}

query Sets {
  sets {
    count
    sets {
      code
      name
      cardCount
      releaseDate
      ...SetRelations
    }
  }  
}


query SetsByType {
  expansion:setsByType(type: "Expansion") {
    count
    sets {
        code
        name
        cardCount
        releaseDate
        ...SetRelations
    }
  }
  commander:setsByType(type: "Commander") {
    count
    sets {
        code
        name
        cardCount
        releaseDate
        ...SetRelations
    }
  }
}

query SetsByType($type: String!) {
  setsByType(type: $type) {
    count
    sets {
        code
        name
        cardCount
        releaseDate
        ...SetRelations
    }
  }  
}

mutation AddSet {
  addSet(input: {
    code: "new"
    name: "New Set"
    releaseDate: "2026-04-01"
    cardCount: 100
    isFoilOnly: false
    isOnlineOnly: false
    logoCode: "new"
    mtgoCode: "new"
    keyruneUnicode: "0x"
    keyruneClass: "new"
    yearSection: "2006"
    tcgplayerId: 100
    setParent: "msh"
    setBlock: "Ice Age"
    setType: "Expansion"
    language: []
  })
}