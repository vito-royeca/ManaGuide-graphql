fragment SetRelations on MGSet {
  setParent {
    code
  }
  setBlock {
    name
  }
  setType {
    name
  }
}

fragment SetBasicInfo on MGSet {
  code
  name
  cardCount
  releaseDate
  ...SetRelations
}

fragment SectionedSets on MGSectionedSets {
  count
  sections
  sectionedSets {
      count
      section
      sets {
        ...SetBasicInfo
      }
  }
}

fragment CardBasicInfo on MGCard {
  cardID: newId
  name
  printedName
  tcgplayerID: tcgplayerId

  artCropURL: artCropUrl
  normalURL: normalUrl
  pngURL: pngUrl
}

query Card($id: String!) {
  card(id: $id) {
    ...CardBasicInfo
    arenaID: arenaId
    cmc
    collectorNumber
    faceOrder
    flavorText
    handModifier
    isBooster
    isDigital
    isFoil
    isFullArt
    isHighresImage
    isNonfoil
    isOversized
    isPromo
    isReprint
    isReserved
    isStorySpotlight
    isTextless
    lifeModifier
    loyalty
    manaCost
    mtgoFoilID: mtgoFoilId
    mtgoID: mtgoId
    multiverseIDs: multiverseIds
    numberOrder
    nameSection
    oracleText
    power
    printedText
    printedTypeLine
    releasedAt
    toughness
    typeLine
    artists {
      name
    }
    colors {
      name
      symbol
    }
    colorIdentities{
      name
      symbol
    }
    colorIndicators{
      name
      symbol
    }
    componentParts {
      card {
        ...CardBasicInfo
      }
      component {
        name
      }
    }
    faces {
      ...CardBasicInfo
    }
    formatLegalities {
      format {
        name
      }
      legality {
        name
      }
    }
    frame {
      name
      description
    }
    frameEffects {
      name
      description
    }
    languages {
      displayCode
      name
    }
    layout {
      name
      description
    }
    otherLanguages {
      ...CardBasicInfo
    }
    otherPrintings {
      ...CardBasicInfo
    }
    prices {
      market
    }
    rarity {
      name
    }
    set {
      code
    }
    subtypes {
      name
    }
    supertypes {
      name
    }
    variations {
      ...CardBasicInfo
    }
    watermark {
      name
    }
  }
}

query Set($input: SetByCodeInput!) {
  set(input: $input) {
    ...SetBasicInfo
    cards {
      ...CardBasicInfo
    }
  }
}

query Sets {
  sets {
    count
    sets {
      ...SetBasicInfo
    }
  }  
}

query SetsByName {
  setsByName {
    ...SectionedSets
  }  
}

query SetsByType {
  setsByType {
    ...SectionedSets
  }  
}

query SetsByYear {
  setsByYear {
    ...SectionedSets
  }  
}

