
fragment SetBasicInfo on MGSet {
  code
  name
  cardCount
  releaseDate
  setBlock {
    name
  }
  setType {
    name
  }
}

fragment SetInfo on MGSet {
  ...SetBasicInfo
  children {
    ...SetBasicInfo
    children {
      ...SetBasicInfo
        children {
          ...SetBasicInfo
        }
    }
  }
}

fragment SectionedSets on MGSectionedSets {
  count
  sections
  sectionedSets {
      count
      section
      sets {
        ...SetInfo
      }
  }
}

fragment CardBasicInfo on MGCard {
  cardID: newId
  name
  printedName
  tcgplayerID: tcgplayerId

  artCropURL: artCropUrl
  normalURL: normalUrl
  pngURL: pngUrl
}

fragment CardInfo on MGCard {
  ...CardBasicInfo
  arenaID: arenaId
  cmc
  collectorNumber
  faceOrder
  flavorText
  handModifier
  isBooster
  isDigital
  isFoil
  isFullArt
  isHighresImage
  isNonfoil
  isOversized
  isPromo
  isReprint
  isReserved
  isStorySpotlight
  isTextless
  lifeModifier
  loyalty
  manaCost
  mtgoFoilID: mtgoFoilId
  mtgoID: mtgoId
  multiverseIDs: multiverseIds
  numberOrder
  oracleText
  power
  printedText
  printedTypeLine
  releasedAt
  toughness
  typeLine
  artists {
    name
  }
  colors {
    name
    symbol
  }
  colorIdentities{
    name
    symbol
  }
  colorIndicators{
    name
    symbol
  }
  componentParts {
    card {
      ...CardBasicInfo
    }
    component {
      name
    }
  }
  faces {
    ...CardBasicInfo
  }
  formatLegalities {
    format {
      name
    }
    legality {
      name
    }
  }
  frame {
    name
    description
  }
  frameEffects {
    name
    description
  }
  languages {
    displayCode
    name
  }
  layout {
    name
    description
  }
  otherLanguages {
    ...CardBasicInfo
  }
  otherPrintings {
    ...CardBasicInfo
  }
  prices {
    market
  }
  rarity {
    name
  }
  set {
    code
  }
  subtypes {
    name
  }
  supertypes {
    name
  }
  variations {
    ...CardBasicInfo
  }
  watermark {
    name
  }
}

query Card($id: String!) {
  card(id: $id) {
    ...CardInfo
  }
}

query Set($input: SetByCodeInput!) {
  set(input: $input) {
    ...SetInfo
    cards {
      ...CardBasicInfo
    }
  }
}

query Sets {
  sets {
    count
    sets {
      ...SetInfo
    }
  }  
}

query SetsByBlock {
  setsByBlock {
    ...SectionedSets
  }  
}

query SetsByName {
  setsByName {
    ...SectionedSets
  }  
}

query SetsByType {
  setsByType {
    ...SectionedSets
  }  
}

query SetsByYear {
  setsByYear {
    ...SectionedSets
  }  
}

